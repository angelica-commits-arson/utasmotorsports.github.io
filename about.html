<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About the Team | Motorsport</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Core Team Styles */
        body {
            font-family: 'Oswald', Arial, sans-serif;
            margin: 0;
            padding: 50px;
            background-color: #000000;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            font-weight: 700;
            font-style: italic;
            margin-bottom: 20px;
            letter-spacing: -1px;
            color: #ffffff;
            border-left: 5px solid #Da2e29; /* Team Red */
            padding-left: 15px;
        }

        /* Sidepanel Navigation Styles */
        .menu-btn {
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            position: fixed;
            top: 30px;
            right: 40px;
            z-index: 1001;
            color: #ffffff;
            transition: transform 0.2s ease, color 0.2s ease;
        }
        .menu-btn:hover { transform: scale(1.1); color: #Da2e29; }

        .side-panel {
            height: 100%;
            width: 300px;
            position: fixed;
            z-index: 1000;
            top: 0;
            right: -320px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: hidden;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding-top: 80px;
        }

        .side-panel a {
            padding: 18px 30px;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
            font-style: italic;
            text-transform: uppercase;
            color: #ffffff;
            display: block;
            letter-spacing: 1px;
            transition: 0.2s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .side-panel a:hover {
            color: #Da2e29;
            background: rgba(255, 255, 255, 0.02);
            padding-left: 40px;
            border-bottom: 1px solid rgba(218, 46, 41, 0.3);
        }

        /* Highlights the current active page in the menu */
        .side-panel a.active {
            color: #Da2e29;
            border-left: 4px solid #Da2e29;
            background: rgba(255, 255, 255, 0.03);
        }

        .side-panel .close-btn {
            position: absolute;
            top: 20px;
            left: 25px;
            font-size: 28px;
            cursor: pointer;
            color: #a0a0a0;
        }
        .side-panel .close-btn:hover { color: #ffffff; }
        .side-panel.open { right: 0; }

        /* Content layouts helper */
        .content-block {
            max-width: 800px;
            margin-top: 40px;
            font-family: Arial, sans-serif; /* Cleaner font for reading paragraphs */
            color: #d1d5db;
            line-height: 1.6;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleNav()">☰ MENU</button>

    <div id="mySidepanel" class="side-panel">
        <span class="close-btn" onclick="toggleNav()">&times;</span>
        <a href="index.html">Home</a>
        <a href="about.html" class="active">About the team</a>
        <a href="departments.html">Departments</a>
        <a href="sponsors.html">Sponsors</a>
        <a href="timeline.html">Timeline</a>
        <a href="contact.html">Contact us</a>
    </div>

    <main>
        <h1>About the Team</h1>
        <div class="content-block">
            <p>Welcome to our team overview page. Formed with a passion for speed and engineering excellence...</p>
            </div>
    </main>

    <script>
        function toggleNav() {
            const panel = document.getElementById("mySidepanel");
            panel.classList.toggle("open");
        }
    </script>
</body>
</html>
