<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to the team</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Base Setup */
        body {
            font-family: 'Oswald', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000000; /* Baseline fallback */
            color: #ffffff;
            letter-spacing: 0.5px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* -------------------------------------------------------------
           GEOMETRIC PADDOCK BACKGROUND LAYERS
           ------------------------------------------------------------- */
        
        /* Base subtle gradient across the entire canvas */
        .paddock-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #07080a 0%, #000000 100%);
            z-index: -3;
        }

        /* Ambient glowing red wash emerging from the bottom right corner */
        .glow-wash {
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 70vw;
            height: 70vh;
            background: radial-gradient(circle, rgba(218, 46, 41, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -2;
            pointer-events: none;
        }

        /* Sharp, geometric layout stripe running down the right-hand canvas */
        .geo-shard {
            position: fixed;
            top: 0;
            right: 0;
            width: 45vw;
            height: 100vh;
            /* Gradient shift matching team red fading down into shadow black */
            background: linear-gradient(180deg, rgba(218, 46, 41, 0.25) 0%, rgba(12, 14, 18, 0.6) 65%, rgba(0, 0, 0, 0.9) 100%);
            /* Creates the crisp, sharp dynamic angular slope */
            clip-path: polygon(35% 0%, 100% 0%, 100% 100%, 0% 100%);
            /* Box shadow emulation via backdrop filter blending layers */
            backdrop-filter: brightness(0.9) contrast(1.1);
            z-index: -1;
            pointer-events: none;
        }

        /* Secondary geometric accent adding depth behind the primary shard */
        .geo-shard-accent {
            position: fixed;
            top: 0;
            right: 10vw;
            width: 40vw;
            height: 100vh;
            background: rgba(218, 46, 41, 0.04);
            clip-path: polygon(45% 0%, 100% 0%, 80% 100%, 20% 100%);
            z-index: -2;
            pointer-events: none;
        }

        /* -------------------------------------------------------------
           NAVIGATION & CONTENT
           ------------------------------------------------------------- */

        /* Permanent Transparent Top Navigation Bar */
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            
            display: flex;
            justify-content: center; 
            align-items: center;
            height: 70px;
            
            /* Glassmorphism over the changing geometric shapes */
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            font-style: italic;
            text-transform: uppercase;
            color: #ffffff;
            letter-spacing: 1.5px;
            padding: 10px 15px;
            transition: all 0.2s ease;
            position: relative;
        }

        .nav-links a.active {
            color: #Da2e29;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: #Da2e29;
            transform-origin: bottom right;
            transition: transform 0.25s ease-out;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        .nav-links a:hover {
            color: #Da2e29;
        }

        /* Main Content Area */
        main {
            padding: 140px 50px 50px 50px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 4rem;
            text-transform: uppercase;
            font-weight: 700;
            font-style: italic;
            margin-bottom: 10px;
            letter-spacing: -1px;
            color: #ffffff;
            border-left: 6px solid #Da2e29;
            padding-left: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        }

        p {
            font-size: 1.1rem;
            color: #b0b5c0; 
            text-transform: uppercase;
            letter-spacing: 2px;
            padding-left: 26px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <div class="paddock-bg"></div>
    <div class="glow-wash"></div>
    <div class="geo-shard-accent"></div>
    <div class="geo-shard"></div>

    <nav class="top-navbar">
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="about.html">About the team</a>
            <a href="departments.html">Departments</a>
            <a href="sponsors.html">Sponsors</a>
            <a href="timeline.html">Timeline</a>
            <a href="contact.html">Contact us</a>
        </div>
    </nav>

    <main>
        <h1>Welcome to the team</h1>
        <p>// Currently under construction.</p>
    </main>

</body>
</html>
