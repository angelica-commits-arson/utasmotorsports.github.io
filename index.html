<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Motorsport Team</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Core Layout Elements */
        body {
            font-family: 'Oswald', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            letter-spacing: 0.5px;
            min-height: 180vh; /* Provides necessary vertical runway for scrolling transitions */
            position: relative;
            overflow-x: hidden;
        }

        /* -------------------------------------------------------------
           AMBIEINT BACKGROUND LAYERS
           ------------------------------------------------------------- */
        .paddock-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #040507 0%, #000000 100%);
            z-index: -10;
        }

        .glow-wash {
            position: fixed;
            bottom: -30%;
            right: -10%;
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(218, 46, 41, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -9;
            pointer-events: none;
        }

        /* -------------------------------------------------------------
           8-LAYER GEOMETRIC FRACTURES (THE PADDOCK SHARDS)
           ------------------------------------------------------------- */
        .geo-shard {
            position: fixed;
            top: 0;
            height: 100vh;
            pointer-events: none;
            will-change: transform, opacity;
            transition: transform 0.15s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 0.15s linear;
        }

        /* SHARD 1: Deep Red Structural Horizon */
        .shard-1 {
            right: 0;
            width: 65vw;
            background: rgba(218, 46, 41, 0.03);
            clip-path: polygon(45% 0%, 100% 0%, 90% 100%, 20% 100%);
            z-index: -8;
        }

        /* SHARD 2: Dark Charcoal Shield */
        .shard-2 {
            right: 8vw;
            width: 50vw;
            background: rgba(10, 11, 14, 0.8);
            border-left: 1px solid rgba(255, 255, 255, 0.02);
            clip-path: polygon(30% 0%, 100% 0%, 100% 100%, 10% 100%);
            z-index: -7;
        }

        /* SHARD 3: Secondary Red Ambient Track */
        .shard-3 {
            right: 2vw;
            width: 42vw;
            background: linear-gradient(180deg, rgba(218, 46, 41, 0.1) 0%, rgba(0, 0, 0, 0) 80%);
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 30% 100%);
            z-index: -6;
        }

        /* SHARD 4: Heavy Tech Core Wall */
        .shard-4 {
            right: 0;
            width: 35vw;
            background: #07080a;
            border-left: 1px solid rgba(218, 46, 41, 0.1);
            clip-path: polygon(40% 0%, 100% 0%, 100% 100%, 0% 100%);
            z-index: -5;
        }

        /* SHARD 5: High-Contrast Blade Accent */
        .shard-5 {
            right: 12vw;
            width: 20vw;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.01) 0%, rgba(218, 46, 41, 0.05) 100%);
            clip-path: polygon(0% 0%, 100% 0%, 60% 100%, 20% 100%);
            z-index: -4;
        }

        /* SHARD 6: Core Primary Team Red Stripe */
        .shard-6 {
            right: 0;
            width: 25vw;
            background: linear-gradient(180deg, rgba(218, 46, 41, 0.22) 0%, rgba(15, 3, 3, 0.6) 60%, rgba(0, 0, 0, 0.95) 100%);
            clip-path: polygon(25% 0%, 100% 0%, 100% 100%, 5% 100%);
            backdrop-filter: brightness(0.95) contrast(1.05);
            z-index: -3;
        }

        /* SHARD 7: Outer Paddock Fractured Shadow Split */
        .shard-7 {
            right: -3vw;
            width: 18vw;
            background: rgba(5, 6, 8, 0.9);
            border-left: 1px solid rgba(255, 255, 255, 0.04);
            clip-path: polygon(45% 0%, 100% 0%, 80% 100%, 0% 100%);
            z-index: -2;
        }

        /* SHARD 8: Foreground Speed Vignette Glow */
        .shard-8 {
            right: -8vw;
            width: 15vw;
            background: linear-gradient(90deg, rgba(218, 46, 41, 0.12) 0%, rgba(0, 0, 0, 0) 100%);
            clip-path: polygon(60% 0%, 100% 0%, 50% 100%, 0% 100%);
            z-index: -1;
        }

        /* -------------------------------------------------------------
           NAVIGATION BAR STYLING
           ------------------------------------------------------------- */
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            font-style: italic;
            text-transform: uppercase;
            color: #ffffff;
            letter-spacing: 1.5px;
            padding: 10px 15px;
            transition: all 0.2s ease;
            position: relative;
        }

        .nav-links a.active {
            color: #Da2e29;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: #Da2e29;
            transform-origin: bottom right;
            transition: transform 0.25s ease-out;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        .nav-links a:hover {
            color: #Da2e29;
        }

        /* -------------------------------------------------------------
           PAGE CONTENT MAIN WRAPPER
           ------------------------------------------------------------- */
        main {
            padding: 140px 50px 50px 50px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 4rem;
            text-transform: uppercase;
            font-weight: 700;
            font-style: italic;
            margin-bottom: 10px;
            letter-spacing: -1px;
            color: #ffffff;
            border-left: 6px solid #Da2e29;
            padding-left: 20px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.9);
        }

        .subtitle {
            font-size: 1.1rem;
            color: #b0b5c0;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding-left: 26px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
            margin-bottom: 50px;
        }
    </style>
</head>
<body>

    <!-- 8-Layer Geometric Paddock Elements -->
    <div class="paddock-bg"></div>
    <div class="glow-wash"></div>
    
    <div class="geo-shard shard-1" id="shard1"></div>
    <div class="geo-shard shard-2" id="shard2"></div>
    <div class="geo-shard shard-3" id="shard3"></div>
    <div class="geo-shard shard-4" id="shard4"></div>
    <div class="geo-shard shard-5" id="shard5"></div>
    <div class="geo-shard shard-6" id="shard6"></div>
    <div class="geo-shard shard-7" id="shard7"></div>
    <div class="geo-shard shard-8" id="shard8"></div>

    <!-- Navigation Header -->
    <nav class="top-navbar">
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="about.html">About the team</a>
            <a href="departments.html">Departments</a>
            <a href="sponsors.html">Sponsors</a>
            <a href="timeline.html">Timeline</a>
            <a href="contact.html">Contact us</a>
        </div>
    </nav>

    <!-- Main Content Grid Component -->
    <main>
        <h1>Welcome to the team</h1>
        <div class="subtitle">// Currently under construction.</div>
    </main>

    <!-- 8-Channel Parallax Scroll Engine Script -->
    <script>
        function updateMultiLayerPaddock() {
            const totalScrollableHeight = document.documentElement.scrollHeight - window.innerHeight;
            if (totalScrollableHeight <= 0) return;
            
            // Map scroll position to a clean 0 to 1 ratio value
            const scrollPercent = window.scrollY / totalScrollableHeight;

            // Apply distinct calculated transforms to each fracture element simultaneously
            document.getElementById('shard1').style.transform = `translateX(${scrollPercent * -45}px) skewX(${scrollPercent * 1}deg)`;
            document.getElementById('shard2').style.transform = `translateX(${scrollPercent * 25}px)`;
            document.getElementById('shard3').style.transform = `translateX(${scrollPercent * -15}px) translateY(${scrollPercent * 20}px)`;
            document.getElementById('shard4').style.transform = `translateX(${scrollPercent * 35}px) scaleX(${1 + scrollPercent * 0.03})`;
            document.getElementById('shard5').style.transform = `translateX(${scrollPercent * -60}px)`;
            
            // Center red highlight tracks opacity and horizontal glide
            const s6 = document.getElementById('shard6');
            s6.style.transform = `translateX(${scrollPercent * -30}px)`;
            s6.style.opacity = `${0.7 + (scrollPercent * 0.3)}`;
            
            document.getElementById('shard7').style.transform = `translateX(${scrollPercent * 15}px)`;
            document.getElementById('shard8').style.transform = `translateX(${scrollPercent * -75}px) skewX(${scrollPercent * -2}deg)`;
        }

        // Window interaction event connections
        window.addEventListener('scroll', updateMultiLayerPaddock);
        window.addEventListener('resize', updateMultiLayerPaddock);
        document.addEventListener("DOMContentLoaded", updateMultiLayerPaddock);
    </script>
<section class="countdown-section">
    <div class="countdown-container">
        <div class="countdown-header">
            <span class="live-indicator"></span>
            <h2>2026 FSAE Competition Countdown</h2>
            <p class="target-location">// Formula Student Australasian Finals</p>
        </div>
        
        <div class="timer-grid">
            <div class="timer-segment">
                <div class="timer-number" id="days">00</div>
                <div class="timer-label">Days</div>
            </div>
            <div class="timer-divider">:</div>
            <div class="timer-segment">
                <div class="timer-number" id="hours">00</div>
                <div class="timer-label">Hours</div>
            </div>
            <div class="timer-divider">:</div>
            <div class="timer-segment">
                <div class="timer-number" id="minutes">00</div>
                <div class="timer-label">Mins</div>
            </div>
            <div class="timer-divider">:</div>
            <div class="timer-segment">
                <div class="timer-number" id="seconds">00</div>
                <div class="timer-label">Secs</div>
            </div>
        </div>
    </div>
</section>

<style>
    .countdown-section {
        padding: 60px 20px;
        max-width: 1200px;
        margin: 0 auto;
        position: relative;
        z-index: 10;
    }
    .countdown-container {
        background: rgba(12, 14, 18, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-left: 4px solid #Da2e29;
        padding: 40px;
        border-radius: 4px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
    }
    @media (min-width: 768px) {
        .countdown-container {
            flex-direction: row;
            justify-content: space-between;
        }
    }
    .countdown-header {
        position: relative;
    }
    .countdown-header h2 {
        font-size: 2.2rem;
        text-transform: uppercase;
        font-style: italic;
        margin: 0 0 5px 0;
        color: #ffffff;
        letter-spacing: -0.5px;
    }
    .countdown-header .target-location {
        font-family: Arial, sans-serif;
        font-size: 0.9rem;
        color: #b0b5c0;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin: 0;
    }
    .live-indicator {
        display: inline-block;
        width: 8px;
        height: 8px;
        background-color: #Da2e29;
        border-radius: 50%;
        margin-right: 8px;
        vertical-align: middle;
        box-shadow: 0 0 8px #Da2e29;
        animation: telemetryPulse 2s infinite;
    }
    .timer-grid {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .timer-segment {
        text-align: center;
        min-width: 70px;
    }
    .timer-number {
        font-size: 3rem;
        font-weight: 700;
        font-style: italic;
        color: #ffffff;
        line-height: 1;
    }
    .timer-label {
        font-family: Arial, sans-serif;
        font-size: 0.75rem;
        text-transform: uppercase;
        color: #Da2e29;
        letter-spacing: 1px;
        font-weight: bold;
        margin-top: 5px;
    }
    .timer-divider {
        font-size: 2.5rem;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.2);
        line-height: 1;
        padding-bottom: 20px;
        animation: pulseDivider 1s infinite;
    }
    @keyframes telemetryPulse {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(218, 46, 41, 0.7); }
        70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(218, 46, 41, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(218, 46, 41, 0); }
    }
    @keyframes pulseDivider {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.9; }
    }
</style>
<script>
    function initCompetitionCountdown() {
        // Set target countdown timestamp here
        const targetDate = new Date("December 07, 2026 15:00:00").getTime();
        
        const dDisplay = document.getElementById("days");
        const hDisplay = document.getElementById("hours");
        const mDisplay = document.getElementById("minutes");
        const sDisplay = document.getElementById("seconds");

        function updateTimer() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference <= 0) {
                clearInterval(timerInterval);
                if(dDisplay) dDisplay.parentElement.parentElement.innerHTML = "<div class='timer-number' style='font-size: 2rem;'>RACE WEEK ACTIVE</div>";
                return;
            }

            // Math breakdowns for standard intervals
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Double digit buffering logic
            if (dDisplay) dDisplay.innerText = days < 10 ? "0" + days : days;
            if (hDisplay) hDisplay.innerText = hours < 10 ? "0" + hours : hours;
            if (mDisplay) mDisplay.innerText = minutes < 10 ? "0" + minutes : minutes;
            if (sDisplay) sDisplay.innerText = seconds < 10 ? "0" + seconds : seconds;
        }

        // Run immediately on cycle launch and bind to interval loop
        updateTimer();
        const timerInterval = setInterval(updateTimer, 1000);
    }
    
    document.addEventListener("DOMContentLoaded", initCompetitionCountdown);
</script>
</body>
</html>
